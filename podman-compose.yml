version: "3.7"

services:
  backend:
    build:
      context: .
      dockerfile: Containerfile
    image: basic-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    networks:
      - basic-net

  caddy:
    image: docker.io/library/caddy:2
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - basic-net

networks:
  basic-net: {}

volumes:
  caddy_data:
  caddy_config:
